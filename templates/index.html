<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="KaushalX is a learning platform that helps you upskill and find new opportunities.">
    <title>KaushalX - Learning Platform</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div id="loginPage" class="page active">
    <div class="login-container">
        <h1>KaushalX</h1>
        <p> Where Learning Meets Opportunity</p>
        <h2>Log in</h2>
        <p>Need a KaushalX account? <a href="#" aria-label="Create an account">create an account</a></p>
        <form id="loginForm">
            <input type="text" placeholder="Username or Email" id="loginUsername" required aria-label="Username or Email">
            <input type="password" placeholder="Password" id="loginPassword" required aria-label="Password">
            <button type="submit" aria-label="Log in">Log in</button>
        </form>
        <p id="loginError" style="color: red;"></p>
        <p><a href="#" aria-label="Forgot username?">Forgot username?</a> <a href="#" aria-label="Forgot password?">Forgot password?</a></p>
    </div>
</div>

<div id="resumePage" class="page">
    <div class="container">
        <h2>Enter Your Skills or Upload Resume</h2>
        <form id="skillsForm" method="POST" action="/submit" enctype="multipart/form-data">
            <label for="skills">Enter your skills (comma-separated):</label>
            <input type="text" id="skills" name="skills" placeholder="e.g., Python, Machine Learning, Java" aria-label="Enter your skills">
            
            <div style="margin: 15px 0; font-weight: bold;">OR</div>
            
            <label for="resume">Upload Your Resume (PDF only):</label>
            <input type="file" id="resume" name="resume" accept=".pdf" aria-label="Upload Your Resume">
            
            <button type="submit" style="margin-top: 20px;">Analyze Now</button>
        </form>
        <p id="resumeError" style="color: red;"></p>
    </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
